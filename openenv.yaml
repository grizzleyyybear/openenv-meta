spec_version: 1
name: ad_review_env
description: >
  Brand-Safe Ad Review environment for UGC content moderation.
  Agents review user-generated content and decide APPROVE/REJECT/ESCALATE
  using IAB Content Taxonomy 3.0 and GARM Brand Safety Floor standards.
type: space
runtime: fastapi
app: server.app:app
port: 8000
version: "1.0.0"
author: "Meta OpenEnv Hackathon"

tasks:
  - id: safe_content
    description: "Clearly brand-safe content — food, fitness, travel, lifestyle posts. Agent must APPROVE without over-flagging."
    difficulty: easy
    count: 8
    grader:
      type: code
      module: grader:grade
  - id: harmful_content
    description: "Clearly harmful content — hate speech, explicit threats, CSAM signals, graphic violence. Agent must REJECT."
    difficulty: easy
    count: 7
    grader:
      type: code
      module: grader:grade
  - id: contextual_moderation
    description: "Alcohol, gambling references, political commentary, health claims requiring context. Agent decides APPROVE/ESCALATE/REJECT."
    difficulty: medium
    count: 10
    grader:
      type: code
      module: grader:grade
  - id: platform_sensitive
    description: "Content acceptable on some platforms (Reddit/X) but not others (TikTok/LinkedIn). Platform-aware moderation."
    difficulty: medium
    count: 8
    grader:
      type: code
      module: grader:grade
  - id: coded_language
    description: "Coded extremist language, dog whistles, MLM recruitment, subtle misinformation without obvious keywords."
    difficulty: hard
    count: 9
    grader:
      type: code
      module: grader:grade
  - id: edge_cases
    description: "Satire, recovery narratives, professional advocacy, figurative language — highest nuance required."
    difficulty: hard
    count: 8
    grader:
      type: code
      module: grader:grade
